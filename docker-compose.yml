# Auteur : BB_NUMERIQUE - LUKUNKU K.SARAH
# docker-compose.yml - Orchestration EVENTFLOW

services:

  # ── PostgreSQL : données métier (users, events, registrations) ──────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventflow_db
      POSTGRES_USER: eventflow_user
      POSTGRES_PASSWORD: eventflow_secret_2024
    volumes:
      - donnees_postgres:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - reseau_eventflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventflow_user -d eventflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MariaDB : journal d'activité (event_logs) ────────────────────────────────
  mariadb:
    image: mariadb:11-jammy
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_secret_2024
      MARIADB_DATABASE: eventflow_logs
      MARIADB_USER: eventflow_user
      MARIADB_PASSWORD: eventflow_secret_2024
    volumes:
      - donnees_mariadb:/var/lib/mysql
      - ./docker/init_mariadb.sql:/docker-entrypoint-initdb.d/init_mariadb.sql
    ports:
      - "3308:3306"
    networks:
      - reseau_eventflow
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── pgAdmin : interface PostgreSQL ───────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eventflow.com
      PGADMIN_DEFAULT_PASSWORD: Admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reseau_eventflow
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ── API Node.js ──────────────────────────────────────────────────────────────
  serveur:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_PORT: 3000
      NODE_ENV: development
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: eventflow_db
      POSTGRES_USER: eventflow_user
      POSTGRES_PASSWORD: eventflow_secret_2024
      # MariaDB
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: eventflow_logs
      MARIADB_USER: eventflow_user
      MARIADB_PASSWORD: eventflow_secret_2024
      # App
      JWT_SECRET: eventflow_jwt_super_secret_2024_bb_numerique
      CLIENT_URL: http://localhost:5174
      CORS_ORIGIN: http://localhost:5174
    ports:
      - "3001:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    networks:
      - reseau_eventflow

  # ── Vue.js client ────────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5174:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - serveur
    networks:
      - reseau_eventflow
    environment:
      VITE_API_URL: http://localhost:3001

volumes:
  donnees_postgres:
    name: eventflow_donnees_postgres
  donnees_mariadb:
    name: eventflow_donnees_mariadb
  pgadmin_data:
    name: eventflow_pgadmin_data

networks:
  reseau_eventflow:
    name: reseau_eventflow
    driver: bridge
